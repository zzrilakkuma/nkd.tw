version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: hookah_user
      POSTGRES_PASSWORD: hookah_password
      POSTGRES_DB: hookah_store
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://hookah_user:hookah_password@db:5432/hookah_store
      SECRET_KEY: your-secret-key-change-in-production
      FRONTEND_URL: http://localhost:3000
    volumes:
      - .:/app

volumes:
  postgres_data:
